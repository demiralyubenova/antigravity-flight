[phases.setup]
nixPkgs = ["nodejs", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m venv python/.venv",
  "python/.venv/bin/pip install rembg[cpu] pillow fastapi uvicorn",
  "python/.venv/bin/python -c \"from rembg import remove; from PIL import Image; import io; img = Image.new('RGB', (10,10)); remove(img); print('rembg model ready')\""
]

[start]
cmd = "python/.venv/bin/python -m uvicorn python.main:app --host 0.0.0.0 --port 8000 2>&1 & echo 'Python server starting on port 8000...' && sleep 5 && tsx server.ts"
